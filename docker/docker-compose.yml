services:
  bot:
    build: 
      context: ..
      dockerfile: docker/Dockerfile
    container_name: birthday_bot
    restart: always
    env_file:
      - ../.env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - db
  
  db:
    image: postgres:15-alpine
    container_name: birthday_db
    restart: always
    env_file:
      - ../.env
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: